# Anvilate seed materials database (schema: standards-data).
#
# Nominal engineering property values for the golden-path materials, each tagged
# with the class of source it is drawn from and the condition it applies to.
# These are widely published handbook/specification-minimum values suitable for
# screening; they are NOT a substitute for a certified material certificate and
# the source standards themselves are not redistributed — only the values.
#
# Dataset-level `license` and `retrieved` fill any property citation that omits
# them (see materials.py::_load_bundle).
dataset:
  name: anvilate-materials-seed
  version: "0.1.0"
  license: "CC0-1.0 (property values only; source standards not redistributed)"
  retrieved: "2026-07-08"

