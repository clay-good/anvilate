# Plain washer dimensions (schema: standards-data).
#
# ISO 7089 plain washers, normal series, 200 HV (formerly DIN 125 A). A joint
# retrieves the inner diameter d1 (clears the screw), the outer diameter d2 (the
# bearing footprint under the head), and the thickness h (which adds to the grip
# length). Keyed by the nominal thread size the washer serves. The source
# standard is not redistributed, only the dimension table.
dataset:
  name: anvilate-washers-seed
  version: "0.1.0"
  source: "ISO 7089 plain washer dimensions (normal series, 200 HV)"
  license: "CC0-1.0 (dimension values only; source standard not redistributed)"
  retrieved: "2026-07-08"

# nominal thread size: inner_diameter (d1), outer_diameter (d2), thickness (h) mm.
washers:
  "ISO7089-M3": {inner_diameter: 3.2, outer_diameter: 7, thickness: 0.5}
  "ISO7089-M4": {inner_diameter: 4.3, outer_diameter: 9, thickness: 0.8}
  "ISO7089-M5": {inner_diameter: 5.3, outer_diameter: 10, thickness: 1.0}
  "ISO7089-M6": {inner_diameter: 6.4, outer_diameter: 12, thickness: 1.6}
  "ISO7089-M8": {inner_diameter: 8.4, outer_diameter: 16, thickness: 1.6}
  "ISO7089-M10": {inner_diameter: 10.5, outer_diameter: 20, thickness: 2.0}
  "ISO7089-M12": {inner_diameter: 13, outer_diameter: 24, thickness: 2.5}
  "ISO7089-M14": {inner_diameter: 15, outer_diameter: 28, thickness: 2.5}
  "ISO7089-M16": {inner_diameter: 17, outer_diameter: 30, thickness: 3.0}
  "ISO7089-M20": {inner_diameter: 21, outer_diameter: 37, thickness: 3.0}
