# Deep-groove ball bearing boundary dimensions (schema: standards-data).
#
# ISO 15 boundary dimensions — bore d, outer diameter D, width B (mm) — for the
# common deep-groove ball bearing series. These are standardized across
# manufacturers, so a shaft seat and a housing bore design against them directly.
# Load ratings and internal geometry are manufacturer- and design-specific and
# deliberately omitted. The source standard is not redistributed — only the
# dimension table.
dataset:
  name: anvilate-bearings-seed
  version: "0.1.0"
  source: "ISO 15 deep-groove ball bearing boundary dimensions"
  license: "CC0-1.0 (dimension values only; source standard not redistributed)"
  retrieved: "2026-07-08"

# designation: {bore (d), outer_diameter (D), width (B)} in mm.
