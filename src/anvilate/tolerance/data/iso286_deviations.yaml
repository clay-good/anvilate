# ISO 286-1 fundamental deviations — grade-independent shaft letters (schema: tolerance-mgmt).
#
# A tolerance zone is a fundamental-deviation letter (where the zone sits) plus an
# IT grade (how wide it is). This table encodes the fundamental deviations whose
# value is a single number per diameter step, independent of grade:
#   - `es` — the upper deviation of the clearance shaft letters d, e, f, g
#     (micrometres, always <= 0), which pushes the zone below the basic size to
#     leave a gap. The corresponding uppercase holes (D..G) follow the ISO 286
#     general rule EI = -es (a clean mirror for the A-H letters, no special-grade
#     correction), so one row serves both.
#   - `ei` — the lower deviation of the transition/interference shaft letters
#     m, n, p (micrometres, >= 0), which pushes the zone above the basic size. The
#     uppercase holes M, N, P are derived from this same `ei` by the ISO 286
#     special rule ES = -ei + Δ, with Δ = IT_n − IT_(n−1) from the IT-grade table.
#     The k shaft rides alongside as an `ei` entry, but its value is grade-banded:
#     nonzero only for grades IT4–IT7, zero elsewhere (the code enforces the band).
#     The finer-stepped interference shafts r and s ride as `ei` entries too, but
#     only up to 50 mm: below that bound their deviation is constant across each of
#     these coarse diameter steps, so the values are exact. Above 50 mm r/s split
#     into finer steps than this table carries, so no r/s entry appears there and
#     the code rejects the lookup rather than reading a neighbouring step.
# The h/H basis letters have zero fundamental deviation and need no entry. The
# grade-dependent letter j, the r/s holes, and the finer-stepped t/u (and r/s
# above 50 mm), land later.
# Diameter steps match the IT-grade table so a zone's width and deviation share
# one range. Values are exact tabulated integers. The source is not redistributed.
dataset:
  source: "ISO 286-1 fundamental deviations (shaft letters d/e/f/g, k, m/n/p, and r/s <= 50 mm)"
  license: "CC0-1.0 (deviation values only; source standard not redistributed)"
  retrieved: "2026-07-08"

max_nominal_mm: 500

# Each range covers basic sizes over the previous range's bound up to and
# including `up_to_mm`. `es` maps a clearance shaft letter to its upper deviation
# (micrometres, negative); `ei` maps a transition/interference shaft letter to its
# lower deviation (micrometres, positive). The `k` entry is grade-dependent: the
# tabulated value applies to grades IT4–IT7, and the deviation is zero for every
# other grade (the code applies that band; the row carries the nonzero value).
ranges:
  - up_to_mm: 3
    es: {d: -20, e: -14, f: -6, g: -2}
    ei: {m: 2, n: 4, p: 6, k: 0, r: 10, s: 14}
  - up_to_mm: 6
    es: {d: -30, e: -20, f: -10, g: -4}
    ei: {m: 4, n: 8, p: 12, k: 1, r: 15, s: 19}
  - up_to_mm: 10
    es: {d: -40, e: -25, f: -13, g: -5}
    ei: {m: 6, n: 10, p: 15, k: 1, r: 19, s: 23}
  - up_to_mm: 18
    es: {d: -50, e: -32, f: -16, g: -6}
    ei: {m: 7, n: 12, p: 18, k: 1, r: 23, s: 28}
  - up_to_mm: 30
    es: {d: -65, e: -40, f: -20, g: -7}
    ei: {m: 8, n: 15, p: 22, k: 2, r: 28, s: 35}
  - up_to_mm: 50
    es: {d: -80, e: -50, f: -25, g: -9}
    ei: {m: 9, n: 17, p: 26, k: 2, r: 34, s: 43}
  - up_to_mm: 80
    es: {d: -100, e: -60, f: -30, g: -10}
    ei: {m: 11, n: 20, p: 32, k: 2}
  - up_to_mm: 120
    es: {d: -120, e: -72, f: -36, g: -12}
    ei: {m: 13, n: 23, p: 37, k: 3}
  - up_to_mm: 180
    es: {d: -145, e: -85, f: -43, g: -14}
    ei: {m: 15, n: 27, p: 43, k: 3}
  - up_to_mm: 250
    es: {d: -170, e: -100, f: -50, g: -15}
    ei: {m: 17, n: 31, p: 50, k: 4}
  - up_to_mm: 315
    es: {d: -190, e: -110, f: -56, g: -17}
    ei: {m: 20, n: 34, p: 56, k: 4}
  - up_to_mm: 400
    es: {d: -210, e: -125, f: -62, g: -18}
    ei: {m: 21, n: 37, p: 62, k: 4}
  - up_to_mm: 500
    es: {d: -230, e: -135, f: -68, g: -20}
    ei: {m: 23, n: 40, p: 68, k: 5}
