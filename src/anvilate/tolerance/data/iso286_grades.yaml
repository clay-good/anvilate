# ISO 286-1 standard tolerance grades — IT grades (schema: tolerance-mgmt).
#
# The standard tolerance (total width of the tolerance zone, in micrometres) for
# a nominal size range and IT grade. These widths are the grade half of every
# ISO fit designation (e.g. the "7" in H7): the fundamental deviation fixes where
# the zone sits, the IT grade fixes how wide it is. This table covers the common
# machining grades IT5–IT16 for basic sizes over 0 up to and including 500 mm —
# the range that spans essentially all fit work; finer gauge grades (IT01–IT4)
# and sizes above 500 mm land later. Values are exact tabulated integers, not
# recomputed from the tolerance-factor formula. The source standard is not
# redistributed — only the tolerance table.
dataset:
  source: "ISO 286-1 standard tolerance grades (IT grades)"
  license: "CC0-1.0 (tolerance values only; source standard not redistributed)"
  retrieved: "2026-07-08"

max_nominal_mm: 500

# Each range covers basic sizes over the previous range's bound up to and
# including `up_to_mm`. `it` maps the IT grade number to its standard tolerance
# width in micrometres for that range.
ranges:
  - up_to_mm: 3
    it: {5: 4, 6: 6, 7: 10, 8: 14, 9: 25, 10: 40, 11: 60, 12: 100, 13: 140, 14: 250, 15: 400, 16: 600}
  - up_to_mm: 6
